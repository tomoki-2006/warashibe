name: Acquire Unity activation file

# One-time helper (docs/CI_SETUP.md): generates the manual activation request (.alf) for a Unity
# Personal license. Run it from the Actions tab ("Run workflow"), download the artifact, exchange
# it at https://license.unity3d.com/manual for a .ulf, then paste the .ulf contents into the
# UNITY_LICENSE repo secret. Not needed if you use a Plus/Pro serial instead.
on:
  workflow_dispatch:

jobs:
  activation:
    name: Request .alf
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
